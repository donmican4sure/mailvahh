<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailvah Pro | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at top right, #1e293b, #0b1120); }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(56, 189, 248, 0.15); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .glass-panel:hover { border-color: rgba(56, 189, 248, 0.3); }
        .sidebar-item { border-left: 3px solid transparent; }
        .active-tab { background: linear-gradient(90deg, rgba(56, 189, 248, 0.1) 0%, transparent 100%); border-left: 3px solid #38bdf8; color: #38bdf8; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); } 50% { box-shadow: 0 0 25px rgba(56, 189, 248, 0.5); } }
        .scanning-glow { animation: pulse-glow 2s infinite; border-color: #38bdf8; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .hidden { display: none !important; }
        .progress-bar-inner { transition: width 0.2s ease-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-200">

    <div class="w-64 bg-[#0f172a] h-full flex flex-col border-r border-slate-800/50 z-10 shadow-2xl">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800/50">
            <div class="w-10 h-10 bg-gradient-to-br from-sky-400 to-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-xl shadow-lg shadow-sky-500/20">M</div>
            <h1 class="text-2xl font-bold tracking-tight text-white">MAILVAH<span class="text-sky-400 text-[10px] ml-1 uppercase tracking-widest align-top">Pro</span></h1>
        </div>

        <div class="flex-1 py-6 flex flex-col gap-1">
            <button onclick="switchTab('single')" id="tab-single" class="sidebar-item active-tab flex items-center gap-3 px-6 py-4 text-slate-400 transition-all text-left w-full hover:text-slate-200">
                <i class="fa-solid fa-crosshairs w-5 text-center"></i><span class="font-medium">Single Target</span>
            </button>
            <button onclick="switchTab('bulk')" id="tab-bulk" class="sidebar-item flex items-center gap-3 px-6 py-4 text-slate-400 transition-all text-left w-full hover:bg-slate-800/30 hover:text-slate-200">
                <i class="fa-solid fa-layer-group w-5 text-center"></i><span class="font-medium">Bulk Engine</span>
            </button>
            <button class="sidebar-item flex items-center gap-3 px-6 py-4 text-slate-600 cursor-not-allowed text-left w-full">
                <i class="fa-solid fa-database w-5 text-center"></i><span class="font-medium">Lead Finder</span><i class="fa-solid fa-lock text-[10px] ml-auto"></i>
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-10 relative">
        
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 id="pageTitle" class="text-3xl font-bold text-white tracking-tight">Deep-Scan Engine</h2>
                <p id="pageDesc" class="text-slate-400 mt-2 text-sm font-light">Direct Port 25 handshakes for zero-bounce validation.</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800/40 px-4 py-2 rounded-full border border-slate-700/50 backdrop-blur-md">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#34d399]"></div>
                <span class="text-xs font-semibold text-slate-300 tracking-wider uppercase">API Server: Secure</span>
            </div>
        </div>

        <div id="view-single" class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl">
            <div class="glass-panel p-8 rounded-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-500 to-transparent opacity-50"></div>
                <label class="block text-xs font-semibold text-sky-400 uppercase tracking-widest mb-3">Target Payload</label>
                <input type="email" id="emailInput" placeholder="ceo@company.com" class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-xl focus:ring-1 focus:ring-sky-500 outline-none transition-all text-lg mb-8 text-white placeholder-slate-600">
                
                <button onclick="verifyEmail()" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-500/25 text-sm tracking-wider flex justify-center items-center gap-3">
                    <i class="fa-solid fa-bolt"></i> ENGAGE ENGINE
                </button>
            </div>
            
            <div id="statusCard" class="glass-panel p-8 rounded-2xl flex flex-col items-center justify-center text-center min-h-[280px]">
                <div id="defaultMsg">
                    <i class="fa-solid fa-radar text-5xl text-slate-700 mb-4 animate-[spin_4s_linear_infinite]"></i>
                    <h3 class="text-slate-300 font-medium text-lg">Awaiting Target</h3>
                </div>
                <div id="resultsContent" class="hidden w-full">
                    <div id="statusIcon" class="text-6xl mb-6 shadow-black drop-shadow-2xl"></div>
                    <h2 id="statusTitle" class="text-3xl font-black mb-2 tracking-tight"></h2>
                    <p id="statusReason" class="text-slate-400 text-sm font-medium"></p>
                </div>
            </div>
        </div>

        <div id="view-bulk" class="hidden grid grid-cols-1 xl:grid-cols-12 gap-8 max-w-7xl">
            
            <div class="xl:col-span-5 flex flex-col gap-6">
                <div class="glass-panel p-8 rounded-2xl text-center group transition-all duration-300 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-sky-500 to-blue-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i class="fa-solid fa-cloud-arrow-up text-6xl text-sky-500/70 mb-4 group-hover:text-sky-400 transition-colors"></i>
                    <h3 class="text-xl font-bold mb-2 text-white">Upload Database</h3>
                    <p class="text-slate-400 text-sm mb-8 leading-relaxed">Scavenger logic will auto-extract emails from raw CSV files.</p>
                    <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="handleFileSelect(event)">
                    <button onclick="document.getElementById('csvFile').click()" class="w-full bg-slate-800/80 hover:bg-slate-700 border border-slate-600/50 text-white font-semibold py-4 rounded-xl transition-all shadow-md text-sm">SELECT DATASET (.CSV)</button>
                </div>

                <button id="startBulkBtn" onclick="startBulkWash()" class="hidden w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold py-5 rounded-xl transition-all shadow-lg shadow-emerald-500/25 tracking-wider text-sm flex justify-center items-center gap-3">
                    <i class="fa-solid fa-play"></i> INITIATE BULK WASH
                </button>

                <button id="downloadBtn" onclick="downloadResults()" class="hidden w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-bold py-5 rounded-xl transition-all shadow-lg shadow-sky-500/25 tracking-wider text-sm flex justify-center items-center gap-3 border border-sky-400/30">
                    <i class="fa-solid fa-download"></i> EXPORT CLEAN ASSET
                </button>
            </div>

            <div class="xl:col-span-7 flex flex-col gap-6">
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="glass-panel p-5 rounded-2xl border-t-2 border-t-slate-500">
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1">Total Found</p>
                        <h3 id="stat-total" class="text-4xl font-black text-white">0</h3>
                    </div>
                    <div class="glass-panel p-5 rounded-2xl border-t-2 border-t-emerald-500 relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 opacity-10 text-7xl text-emerald-500"><i class="fa-solid fa-shield-check"></i></div>
                        <p class="text-emerald-500 text-xs font-bold uppercase tracking-wider mb-1">Deliverable</p>
                        <h3 id="stat-valid" class="text-4xl font-black text-white">0</h3>
                    </div>
                    <div class="glass-panel p-5 rounded-2xl border-t-2 border-t-red-500 relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 opacity-10 text-7xl text-red-500"><i class="fa-solid fa-skull"></i></div>
                        <p class="text-red-500 text-xs font-bold uppercase tracking-wider mb-1">Dead</p>
                        <h3 id="stat-invalid" class="text-4xl font-black text-white">0</h3>
                    </div>
                </div>

                <div id="progressContainer" class="hidden glass-panel p-5 rounded-2xl flex flex-col justify-center">
                    <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">
                        <span>Engine Status</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-800">
                        <div id="progressBar" class="bg-gradient-to-r from-sky-500 to-blue-500 h-2 rounded-full progress-bar-inner shadow-[0_0_10px_#38bdf8]" style="width: 0%"></div>
                    </div>
                </div>

                <div id="liveFeedContainer" class="hidden glass-panel p-0 rounded-2xl flex-1 flex flex-col overflow-hidden min-h-[300px]">
                    <div class="bg-slate-900/80 px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest"><i class="fa-solid fa-terminal mr-2 text-sky-500"></i> Server Terminal Log</h3>
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                            <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                            <div class="w-2 h-2 rounded-full bg-emerald-500/50"></div>
                        </div>
                    </div>
                    <div id="liveFeed" class="p-4 overflow-y-auto space-y-2 h-[300px] custom-scrollbar bg-[#050914] font-mono text-[11px]">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('tab-single').classList.remove('active-tab');
            document.getElementById('tab-bulk').classList.remove('active-tab');
            document.getElementById('view-single').classList.add('hidden');
            document.getElementById('view-bulk').classList.add('hidden');

            if (tab === 'single') {
                document.getElementById('tab-single').classList.add('active-tab');
                document.getElementById('view-single').classList.remove('hidden');
                document.getElementById('pageTitle').innerText = "Deep-Scan Engine";
                document.getElementById('pageDesc').innerText = "Direct Port 25 handshakes for zero-bounce validation.";
            } else {
                document.getElementById('tab-bulk').classList.add('active-tab');
                document.getElementById('view-bulk').classList.remove('hidden');
                document.getElementById('view-bulk').classList.add('grid');
                document.getElementById('pageTitle').innerText = "Bulk List Processor";
                document.getElementById('pageDesc').innerText = "Enterprise-grade batch cleaning and domain protection.";
            }
        }

        async function verifyEmail() {
            const email = document.getElementById('emailInput').value;
            if (!email) return;
            const card = document.getElementById('statusCard');
            document.getElementById('defaultMsg').classList.add('hidden');
            document.getElementById('resultsContent').classList.remove('hidden');
            
            card.classList.add('scanning-glow');
            document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-microchip text-sky-400 animate-pulse"></i>';
            document.getElementById('statusTitle').innerText = "HEURISTIC SCAN...";
            document.getElementById('statusTitle').className = "text-3xl font-black mb-2 text-sky-400 tracking-tight";
            document.getElementById('statusReason').innerText = "Firing 3-burst anomaly matrix...";
            
            try {
                const response = await fetch('https://api.mailvah.com/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();
                
                card.classList.remove('scanning-glow');
                
                if (data.status === 'VALID') {
                    document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-shield-check text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]"></i>';
                    document.getElementById('statusTitle').innerText = "DELIVERABLE";
                    document.getElementById('statusTitle').className = "text-3xl font-black mb-2 text-emerald-400 tracking-tight";
                    document.getElementById('statusReason').innerText = `${data.reason} (Confidence: ${data.confidence}%)`;
                } else if (data.status === 'CATCH_ALL') {
                    document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-triangle-exclamation text-yellow-500 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]"></i>';
                    document.getElementById('statusTitle').innerText = "CATCH-ALL SHIELD";
                    document.getElementById('statusTitle').className = "text-3xl font-black mb-2 text-yellow-500 tracking-tight";
                    document.getElementById('statusReason').innerText = `${data.reason}. Do not send.`;
                } else {
                    document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-skull text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>';
                    document.getElementById('statusTitle').innerText = "UNDELIVERABLE";
                    document.getElementById('statusTitle').className = "text-3xl font-black mb-2 text-red-500 tracking-tight";
                    document.getElementById('statusReason').innerText = "Fatal bounce risk detected.";
                }
            } catch (e) {
                card.classList.remove('scanning-glow');
                document.getElementById('statusTitle').innerText = "API ERROR";
            }
        }
        let bulkEmails = [];
        let exportData = []; 

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const extracted = text.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/gi);
                
                if (extracted && extracted.length > 0) {
                    bulkEmails = [...new Set(extracted)]; 
                    document.getElementById('stat-total').innerText = bulkEmails.length;
                    
                    // Reset
                    document.getElementById('stat-valid').innerText = "0";
                    document.getElementById('stat-invalid').innerText = "0";
                    document.getElementById('downloadBtn').classList.add('hidden');
                    document.getElementById('liveFeedContainer').classList.add('hidden');
                    document.getElementById('progressContainer').classList.add('hidden');
                    document.getElementById('liveFeed').innerHTML = '';
                    document.getElementById('progressBar').style.width = '0%';
                    
                    const btn = document.getElementById('startBulkBtn');
                    btn.classList.remove('hidden');
                    btn.classList.remove('bg-slate-700', 'border-slate-600', 'text-slate-400');
                    btn.classList.add('bg-gradient-to-r', 'from-emerald-500', 'to-emerald-600', 'text-white');
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-play"></i> INITIATE WASH (${bulkEmails.length} Targets)`;
                }
            };
            reader.readAsText(file);
        }

        async function startBulkWash() {
            const btn = document.getElementById('startBulkBtn');
            const feedContainer = document.getElementById('liveFeedContainer');
            const feed = document.getElementById('liveFeed');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            
            btn.disabled = true;
            feedContainer.classList.remove('hidden');
            progressContainer.classList.remove('hidden');
            
            exportData = []; 
            let validCount = 0; 
            let invalidCount = 0;

            for (let i = 0; i < bulkEmails.length; i++) {
                btn.innerHTML = `<i class="fa-solid fa-satellite-dish fa-spin"></i> Processing...`;
                
                let feedHtml = '';

                try {
                    const response = await fetch('https://api.mailvah.com/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: bulkEmails[i] })
                    });
                    const data = await response.json();
                    
                    if (data.status === 'VALID') {
                        validCount++;
                        document.getElementById('stat-valid').innerText = validCount;
                        exportData.push({ email: bulkEmails[i], status: 'DELIVERABLE' });
                        feedHtml = `<div class="flex justify-between items-center py-1 border-b border-slate-800/50"><span class="text-slate-300 truncate max-w-[75%]">> PING ${bulkEmails[i]}</span><span class="text-emerald-400">[ SAFE ]</span></div>`;
                    } else {
                        invalidCount++;
                        document.getElementById('stat-invalid').innerText = invalidCount;
                        exportData.push({ email: bulkEmails[i], status: 'UNDELIVERABLE' });
                        feedHtml = `<div class="flex justify-between items-center py-1 border-b border-slate-800/50"><span class="text-slate-500 truncate max-w-[75%] line-through">> PING ${bulkEmails[i]}</span><span class="text-red-500">[ DEAD ]</span></div>`;
                    }
                } catch (e) {
                    exportData.push({ email: bulkEmails[i], status: 'ERROR' });
                }
                
                // Update Progress Bar
                let percent = Math.round(((i + 1) / bulkEmails.length) * 100);
                progressBar.style.width = percent + '%';
                progressText.innerText = percent + '%';

                if (feedHtml) {
                    feed.insertAdjacentHTML('beforeend', feedHtml);
                    feed.scrollTop = feed.scrollHeight;
                }

                await new Promise(r => setTimeout(r, 200)); 
            }

            btn.innerHTML = `<i class="fa-solid fa-check-double"></i> OPERATION COMPLETE`;
            btn.classList.remove('bg-gradient-to-r', 'from-emerald-500', 'to-emerald-600', 'text-white');
            btn.classList.add('bg-slate-800', 'border', 'border-emerald-500/30', 'text-emerald-400');
            document.getElementById('downloadBtn').classList.remove('hidden');
        }

        function downloadResults() {
            let csvContent = "data:text/csv;charset=utf-8,Email_Address,Mailvah_Status\n";
            exportData.forEach(function(rowArray) {
                csvContent += rowArray.email + "," + rowArray.status + "\n";
            });
            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Mailvah_Clean_Asset.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
