<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailvah Pro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item:hover { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-right: 3px solid #38bdf8; }
        .active-tab { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-right: 3px solid #38bdf8; }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scanning { animation: pulse-slow 1.5s infinite; color: #38bdf8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="w-64 glass h-full flex flex-col border-r border-slate-800">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800">
            <div class="w-10 h-10 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-slate-900 text-xl">M</div>
            <h1 class="text-2xl font-bold tracking-tighter">MAILVAH<span class="text-sky-500 text-xs ml-1">PRO</span></h1>
        </div>

        <div class="flex-1 py-6 flex flex-col gap-2">
            <button class="sidebar-item active-tab flex items-center gap-3 px-6 py-4 text-slate-400 transition-all text-left w-full">
                <i class="fa-solid fa-crosshairs w-5 text-center"></i>
                <span class="font-medium">Single Verify</span>
            </button>
            <button class="sidebar-item flex items-center gap-3 px-6 py-4 text-slate-400 transition-all text-left w-full">
                <i class="fa-solid fa-file-csv w-5 text-center"></i>
                <span class="font-medium">Bulk List Washer</span>
                <span class="ml-auto text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">PRO</span>
            </button>
            <button class="sidebar-item flex items-center gap-3 px-6 py-4 text-slate-400 transition-all text-left w-full">
                <i class="fa-solid fa-magnifying-glass w-5 text-center"></i>
                <span class="font-medium">Lead Finder</span>
                <span class="ml-auto text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">PRO</span>
            </button>
        </div>

        <div class="p-6 border-t border-slate-800">
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                <p class="text-xs text-slate-400 mb-1">Zero-Burn Credits</p>
                <div class="flex items-end gap-2">
                    <span class="text-2xl font-bold text-emerald-400">10,000</span>
                </div>
                <button class="mt-3 w-full bg-slate-700 hover:bg-slate-600 text-xs font-bold py-2 rounded transition-all">BUY CREDITS (FLUTTERWAVE)</button>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black">
        
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold">Deep-Scan Engine</h2>
                <p class="text-slate-400 mt-1">Verify an inbox instantly using direct Port 25 handshakes.</p>
            </div>
            <div class="flex items-center gap-4 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-sm font-medium text-slate-300">Engine API: Online</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl">
            
            <div class="glass p-8 rounded-2xl">
                <label class="block text-sm font-medium text-slate-400 mb-2">Target Email Address</label>
                <input type="email" id="emailInput" placeholder="ceo@company.com" 
                       class="w-full bg-slate-900/80 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all text-lg mb-6">
                
                <button onclick="verifyEmail()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-500/20 text-lg flex justify-center items-center gap-2">
                    <i class="fa-solid fa-bolt"></i> ENGAGE ENGINE
                </button>
            </div>

            <div id="statusCard" class="glass p-8 rounded-2xl flex flex-col items-center justify-center text-center min-h-[250px]">
                <div id="defaultMsg">
                    <i class="fa-solid fa-shield-halved text-4xl text-slate-600 mb-4"></i>
                    <h3 class="text-slate-300 font-medium text-lg">Awaiting Target</h3>
                    <p class="text-slate-500 text-sm mt-2">Enter an email to initiate Port 25 scan.</p>
                </div>

                <div id="resultsContent" class="hidden w-full">
                    <div id="statusIcon" class="text-5xl mb-4"></div>
                    <h2 id="statusTitle" class="text-3xl font-bold mb-2"></h2>
                    <p id="statusReason" class="text-slate-400"></p>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function verifyEmail() {
            const email = document.getElementById('emailInput').value;
            const statusCard = document.getElementById('statusCard');
            const defaultMsg = document.getElementById('defaultMsg');
            const resultsContent = document.getElementById('resultsContent');
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusReason = document.getElementById('statusReason');

            if (!email) return;

            defaultMsg.classList.add('hidden');
            resultsContent.classList.remove('hidden');
            
            statusCard.style.boxShadow = "none";
            statusCard.style.borderColor = "rgba(255, 255, 255, 0.05)";
            
            statusIcon.innerHTML = '<i class="fa-solid fa-satellite-dish text-sky-500 scanning"></i>';
            statusTitle.innerText = "Bypassing Filters...";
            statusTitle.className = "text-3xl font-bold mb-2 scanning";
            statusReason.innerText = "Connecting to MX Nodes...";
            
            try {
                // Notice this points to your new Cloudflare API subdomain!
                const response = await fetch('http://api.mailvah.com:3000/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();
                
                if (data.status === 'VALID') {
                    statusCard.style.boxShadow = "0 0 30px rgba(16, 185, 129, 0.15)";
                    statusCard.style.borderColor = "#10b981";
                    statusIcon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
                    statusTitle.innerText = "DELIVERABLE";
                    statusTitle.className = "text-3xl font-bold mb-2 text-emerald-500";
                    statusReason.innerText = "Inbox is active. Safe to send.";
                } else {
                    statusCard.style.boxShadow = "0 0 30px rgba(239, 68, 68, 0.15)";
                    statusCard.style.borderColor = "#ef4444";
                    statusIcon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                    statusTitle.innerText = "UNDELIVERABLE";
                    statusTitle.className = "text-3xl font-bold mb-2 text-red-500";
                    statusReason.innerText = data.reason || "Hard bounce risk. Do not send.";
                }
            } catch (error) {
                statusIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-yellow-500"></i>';
                statusTitle.innerText = "Connection Error";
                statusTitle.className = "text-3xl font-bold mb-2 text-yellow-500";
                statusReason.innerText = "Could not reach api.mailvah.com.";
            }
        }
    </script>
</body>
</html>
